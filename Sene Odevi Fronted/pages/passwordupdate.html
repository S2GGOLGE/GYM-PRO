<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro |Şifre Guncelleme</title>
    <link rel="icon" href="/css/Images/logo.png">
    <link rel="stylesheet" href="/css/passupdate.css">
</head>

<body>
    <div class="menu">
        <a href="/pages/giriş.html">Geri Dön</a>
    </div>

    <div class="container">
        <div class="form">
            <!-- Inputlara id ekledik -->
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="text" id="phone" placeholder="Telefon">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Şifre Giriniz...">
            <input type="password" id="passRepeat" placeholder="Şifre Tekrar Giriniz...">
            <button id="passUpdateBtn" class="Update-btn" onclick="passUpdate()">Şifre Yenile</button>
        </div>
    </div>

    <script src="/js/passUpdate.js"></script>
</body>

</html>

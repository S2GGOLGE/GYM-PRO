<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Gym Pro</title>

    <link rel="stylesheet" href="/css/kayıt.css">
    <link rel="icon" href="/Images/logo.png">

</head>

<body>

    <div class="menu">
        <a href="/pages/giriş.html"> ←Geri Dön</a>
    </div>
    <div class="container">

        <div class="form">
            <input type="text" id="name" placeholder="Ad">
            <input type="text" id="surname" placeholder="Soyad">
            <input type="text" id="username" placeholder="Kullanıcı adı">
            <input type="email" id="mail" placeholder="Email">
            <input type="text" id="iletisim" placeholder="Telefon">

            <div class="cinsiyet">
                <input type="radio" name="gender" id="erkek"> Erkek
                <input type="radio" name="gender" id="bayan"> Bayan
            </div>

            <div class="sozlesme">
                <input type="checkbox" id="sozlesme">
                <a href="#" id="openModalLink">Sözleşmeyi Aç</a>

                <div id="modal" class="modal">
                    <div class="modal-content">
                        <span class="close" id="closeModal">&times;</span>
                        <h2>Sözleşme</h2>
                        <p>Buraya içerik gelecek...</p>
                    </div>
                </div>
            </div>

            <input type="password" id="pass" placeholder="Şifre">
            <input type="password" id="passRepeat" placeholder="Şifre Tekrar">

            <button onclick="kayit()" class="kayıt-btn">Kayıt Ol</button>

        </div>
    </div>

    <footer>
        <p>© 2026 GymPro</p>
    </footer>
    <script src="/js/kayit.js"></script>

</body>

</html>

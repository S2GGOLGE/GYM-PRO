<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş | Gym Pro</title>
    <link rel="stylesheet" href="/css/giriş.css">
    <link rel="icon" href="/Images/logo.png">
</head>

<body>
    <div class="menu">
        <a href="/pages/başlangıc.html"> ← Geri Dön</a>
    </div>

    <div class="container">
        <div class="form">
            <input type="text" placeholder="Kullanıcı Adı" id="user">
            <input type="password" placeholder="Şifre" id="pass">

            <button class="gırıs-btn" onclick="login()">Giriş</button>
            <button class="kayıtol-btn" onclick="kayıt()">Kayıt Ol</button>

            <!-- Artık modal yok, direkt sayfaya yönlendir -->
            <button class="şifreupdate-btn" onclick="openModal()">Şifremi Unuttum</button>
        </div>
    </div>
    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>

            <h2>Şifre Sıfırla</h2>

            <input type="text" placeholder="Email veya Kullanıcı Adı" id="resetUser">
            <input type="text" placeholder="Doğrulama Kodu" id="resetCode">
            <input type="password" placeholder="Yeni Şifre" id="newPass">

            <button onclick="sendCode()">Kod Gönder</button>
            <button onclick="resetPassword()">Şifreyi Güncelle</button>
        </div>
    </div>

    <footer>
        <p>© 2026 GymPro</p>
    </footer>

    <script src="/js/giriş.js"></script>
</body>

</html>

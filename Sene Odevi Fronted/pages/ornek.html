<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobil Şablon</title>

    <style>
        :root {
            --bg: #000;
            --card: #1a1a1a;
            --text: #fff;
            --accent: #ccff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #111;
            position: sticky;
            top: 0;
        }

        .logo {
            margin-left: 15px;
            color: var(--accent);
            font-weight: bold;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: #111;
            padding-top: 60px;

            transform: translateX(-100%);
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            padding: 15px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #222;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        /* OVERLAY */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);

            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 999;
        }

        #overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* CONTENT */
        .container {
            padding: 15px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        /* TABLET */
        @media(min-width: 768px) {
            .container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
        }

        /* DESKTOP */
        @media(min-width: 1024px) {
            .sidebar {
                transform: translateX(0);
                width: 200px;
            }

            #overlay {
                display: none;
            }

            .container {
                margin-left: 200px;
                grid-template-columns: 1fr 1fr 1fr;
            }

            .menu-btn {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo">PATRON</div>
    </header>

    <!-- KARARTMA -->
    <div id="overlay" onclick="closeMenu()"></div>

    <!-- SIDEBAR -->
    <nav id="sidebar" class="sidebar">
        <a href="#">Ana Sayfa</a>
        <a href="#">Profil</a>
        <a href="#">Ayarlar</a>
        <a href="#">Çıkış</a>
    </nav>

    <!-- ANA İÇERİK -->
    <main class="container">
        <div class="card">Kart 1</div>
        <div class="card">Kart 2</div>
        <div class="card">Kart 3</div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        function closeMenu() {
            document.getElementById("sidebar").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
        }
    </script>

</body>
</html>

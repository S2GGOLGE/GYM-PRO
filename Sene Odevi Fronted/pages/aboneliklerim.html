<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM PRO | ABONELİKLERİM</title>
    <link rel="stylesheet" href="/css/aboneliklerim.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="icon" href="/Images/logo.png">
</head>

<body>
    <div class="container">

        <!-- Başlık -->
        <div class="yazi">
            <h1>PLANLARIMIZ</h1>
        </div>

        <!-- Kartlar -->
        <div class="content">

            <!-- Basic Plan -->
            <div class="plan-card basic">
                <a href="#" onclick="openModal('sozlesmeModal'); return false;" class="sozlesme">
                    Basic
                </a>
            </div>
            <!-- Basic Modal -->
            <div id="sozlesmeModal" class="modal">
                <div class="modal-content">

                    <span class="close" onclick="closeModal('sozlesmeModal')">&times;</span>
                    <h2 style="color: white;">Plan Turleri Buraya Gelecek</h2>
                </div>
            </div>
            <!-- Pro Plan -->
            <div class="plan-card pro">
                <a href="#" onclick="openModal('sozlesmeModal'); return false;" class="sozlesme">
                    Pro
                </a>
            </div>
            <!-- Pro Modal -->
            <div id="sozlesmeModal" class="modal">
                <div class="modal-content">

                    <span class="close" onclick="closeModal('sozlesmeModal')">&times;</span>
                    <h2 style="color: white;">Plan Turleri Buraya Gelecek</h2>
                </div>
            </div>
            <!-- Pro+ Plan -->
            <div class="plan-card proplus">
                <a href="#" onclick="openModal('sozlesmeModal'); return false;" class="sozlesme">
                    Pro+
                </a>
            </div>
            <!-- Pro + modal  -->
            <div id="sozlesmeModal" class="modal">
                <div class="modal-content">
                    <h2 style="color: white;">Plan Turleri Buraya Gelecek</h2>
                    <span class="close" onclick="closeModal('sozlesmeModal')">&times;</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>© 2026 GymPro</p>
        </footer>

    </div>
    <script src="/js/modal.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro | Başlangıç</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/başlangıc.css">
    <link rel="icon" href="/Images/logo.png">
</head>

<body>
    <div class="Container">
        <header class="header">
            <h1>GYM-PRO İLE</h1>
            <h6>Gücünü Ortaya Çıkar</h6>
        </header>

        <main class="content">
            <div class="sol">
                <h1>Sınırlarını yeniden yaz.</h1>
                <p>Güç burada başlar.</p>
            </div>
            <div class="sağ">
                <button class="basla-btn" onclick="Basla_btn()">İdmana Başla</button>
                <button class="kesfet-btn">Keşfet</button>
            </div>
        </main>

        <footer class="footer">
            <div class="Kart-1">
                <i class="fas fa-users"></i>
                <span class="uye-sayisi"><span id="aktif-sayi">0</span>+ Aktif Üye</span>
            </div>
            
            <div class="copyright">
                <p>© 2026 GymPro</p>
            </div>
        </footer>
    </div>

    <script>
        function sayacBaslat(hedef, elementId) {
            let baslangic = 0;
            const artis = hedef / 100; 
            const element = document.getElementById(elementId);

            const guncelle = setInterval(() => {
                baslangic += artis;
                if (baslangic >= hedef) {
                    element.innerText = Math.floor(hedef).toLocaleString();
                    clearInterval(guncelle);
                } else {
                    element.innerText = Math.floor(baslangic).toLocaleString();
                }
            }, 20);
        }

        window.onload = () => {
            sayacBaslat(1250, "aktif-sayi");
        };

        function Basla_btn() {
         window.location.href = "giriş.html";
        }
    </script>
</body>

</html>
